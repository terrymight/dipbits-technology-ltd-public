name: Deploy Hugo site

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'

      - name: Build
        run: hugo

      - name: Deploy to public repo
        uses: peaceiris/actions-gh-pages@v3
        with:
          external_repository: YOUR_USERNAME/YOUR_PUBLIC_REPO
          publish_branch: main
          publish_dir: ./public
          personal_token: ${{ secrets. }}
